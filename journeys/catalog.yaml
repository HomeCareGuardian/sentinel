version: "1"
owners: platform-qa
model: black-box
description: |
  Journeys validate deployed targets via public HTTP/UI only.
  This repo does not build or run product stacks.

p0:
  - id: J1
    name: Hub boots and reports healthy
    surfaces: [core, ios]
    target_env: HUB_BASE_URL
    paths: [/health, /api/status, /api/health]
  - id: J2
    name: Caregiver auth and profile
    surfaces: [core]
    paths: [/api/auth/register, /api/users/me]
  - id: J3
    name: Live entity states via hub API
    surfaces: [core, ios]
    paths: [/api/states]
    notes: Set E2E_MOTION_ENTITY_ID when staging has a known entity
  - id: J4
    name: Anomaly lifecycle
    surfaces: [core, ios]
    paths: [/api/anomalies, /api/anomalies/{id}/acknowledge]
  - id: J5
    name: Marketing site usable
    surfaces: [website]
    target_env: WEBSITE_BASE_URL
    playwright_tags: ["@p0"]

p1:
  - id: J6
    name: Dashboard aggregate
    paths: [/api/dashboard]
  - id: J7
    name: ML engine state
    paths: [/api/ml/engine/state]

quarantine: []
