name: Virtual hub smoke

# Cost-aware: manual or path-filtered only. No daily GitHub schedule.
# Standing twin daily runs belong on the OCI VM cron (see docs/OCI_ALWAYS_FREE_RUNBOOK.md).

on:
  workflow_dispatch:
    inputs:
      hcg_image:
        description: HCG_IMAGE ref (tag or digest)
        required: false
        default: ghcr.io/homecareguardian/hcg-core:latest
      scenario:
        description: Scenario to inject before tests
        required: false
        default: idle_home
  pull_request:
    paths:
      - "docker-compose.virtual-hub.yml"
      - "virtual_hub/**"
      - "suites/functional/**"
      - "oracle/**"
      - "scripts/virtual-hub.sh"
      - "docs/VIRTUAL_CUSTOMER_HUB.md"
      - ".github/workflows/virtual-hub.yml"

concurrency:
  group: virtual-hub-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  unit:
    name: normaliser unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Normaliser unit checks (no Docker)
        run: pytest -m functional suites/functional/test_casas_normaliser.py

  stack:
    name: twin stack smoke
    needs: unit
    runs-on: ubuntu-latest
    # Fail-closed stack: workflow_dispatch always; PRs only when explicitly enabled.
    if: >
      github.event_name == 'workflow_dispatch' ||
      vars.VCH_STACK_SMOKE_ENABLED == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Require GHCR_READ_TOKEN
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          if [ -z "${GHCR_READ_TOKEN}" ]; then
            echo "::error::GHCR_READ_TOKEN is required for twin stack smoke (fail-closed)."
            exit 1
          fi

      - name: Login to GHCR
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Prepare twin env
        env:
          HCG_IMAGE_INPUT: ${{ github.event.inputs.hcg_image || 'ghcr.io/homecareguardian/hcg-core:latest' }}
        run: |
          cp config/targets.virtual-hub.env.example config/targets.virtual-hub.env
          sed -i "s|^HCG_IMAGE=.*|HCG_IMAGE=${HCG_IMAGE_INPUT}|" config/targets.virtual-hub.env
          sed -i "s|^ADMIN_PASSWORD=.*|ADMIN_PASSWORD=vch_ci_admin|" config/targets.virtual-hub.env

      - name: Compose config validate
        run: docker compose -f docker-compose.virtual-hub.yml --env-file config/targets.virtual-hub.env config >/dev/null

      - name: Bring up twin
        run: |
          chmod +x scripts/virtual-hub.sh
          ./scripts/virtual-hub.sh up

      - name: Inject scenario + functional API tests
        env:
          VCH_SCENARIO: ${{ github.event.inputs.scenario || 'idle_home' }}
          HUB_TRANSPORT: direct
          VCH_REQUIRE_SCENARIO: "1"
        run: |
          ./scripts/virtual-hub.sh run-scenario "${VCH_SCENARIO}"
          ./scripts/virtual-hub.sh run-tests -m "functional and requires_virtual_hub" suites/functional

      - name: Tear down
        if: always()
        run: ./scripts/virtual-hub.sh down
