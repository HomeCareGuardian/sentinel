# Live GET catalog for hcg-core hub (port 8080).
# Calibrated 2026-07-22 against hub 0.1.10 via loopback (ssh-exec transport).
#
# Rules:
#   - 500 is NEVER an accepted status; a 500 anywhere is a hub bug (fails the gate).
#   - auth: admin  -> request is sent with ADMIN_USERNAME/ADMIN_PASSWORD Basic auth
#     and the expected status is the AUTHENTICATED one. Without ADMIN_* set these
#     endpoints answer 401 (also listed so unauthenticated runs still gate).
#   - 503 only where a documented dependency can be legitimately absent
#     (weather: no household postcode on hub yet — hcg#2242 address gap).
version: "1"
endpoints:
  - { method: GET, path: /health, expect: [200] }
  - { method: GET, path: /api/health, expect: [200] }
  - { method: GET, path: /api/status, expect: [200] }
  - { method: GET, path: /api/states, expect: [200] }
  - { method: GET, path: /api/entities, expect: [200] }
  - { method: GET, path: /api/dashboard, expect: [200] }
  - { method: GET, path: /api/anomalies, expect: [200] }
  - { method: GET, path: /api/devices, expect: [200] }
  - { method: GET, path: /api/devices/debug, expect: [200] }
  - { method: GET, path: /api/devices/search, expect: [200, 400, 404], query: "query=a" }
  - { method: GET, path: /api/areas, expect: [200] }
  - { method: GET, path: /api/rooms, expect: [200] }
  - { method: GET, path: /api/places, expect: [200] }
  - { method: GET, path: /api/presence/snapshot, expect: [200] }
  - { method: GET, path: /api/presence/history, expect: [200] }
  - { method: GET, path: /api/resident/status, expect: [200, 401], auth: admin }
