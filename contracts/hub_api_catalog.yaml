  - { method: GET, path: /api/admin/users, expect: [200, 401], auth: admin }
  - { method: GET, path: /api/admin/ml/status, expect: [200, 401], auth: admin }
  - { method: GET, path: /api/admin/database/tables, expect: [200, 401], auth: admin }
  - { method: GET, path: /api/containers/status, expect: [200] }
