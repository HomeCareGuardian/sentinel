# Hub endpoints the iOS app calls, per HCGAPIEndpoints.swift (the app's single
# API surface). Vendored so Sentinel needs no product checkout at run time.
#
# Regenerate after iOS API changes:
#   grep -Eo '// *(GET|POST|PUT|DEL|DELETE|PATCH) +/[A-Za-z0-9/_{}.-]+' \
#     iOS-App/HomeCareGuardian/Clients/HCGAPI/HCGAPIEndpoints.swift \
#     | sed -E 's|// *||; s/DEL /DELETE /; s/  +/ /' | sort -u
#
# Synced: 2026-07-22 (iOS-App main). Drift outside the enum cannot be seen here
# (see iOS-App#748) — enforce "all hub calls go through HCGAPIEndpoint" instead.
